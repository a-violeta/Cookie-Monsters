spring:

  #main:
    #web-application-type: none

  profiles:
    active: cli

  datasource:
      url: jdbc:h2:mem:mydb
      username: sa
      password: password
      driverClassName: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    open-in-view: false   # no web requests reading entities lazily; avoids the "OSIV" warning Spring logs on every startup

  application:
    name: cookie-monsters

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080   # so we know exactly where the console + future REST API will live